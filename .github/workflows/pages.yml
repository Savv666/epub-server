name: Website Check

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check website files
        run: |
          test -f docs/index.html
          test -f docs/library.json
          echo "Website files exist. GitHub Pages deploys from main/docs."
