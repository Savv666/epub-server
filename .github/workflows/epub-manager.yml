name: EPUB Manager

on:
  issues:
    types:
      - opened
  workflow_dispatch:
  schedule:
    - cron: "15 2 * * *"

permissions:
  contents: write
  issues: write

concurrency:
  group: epub-manager-main
  cancel-in-progress: false

jobs:
  build-epub:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event_name == 'schedule' || startsWith(github.event.issue.title, '[EPUB MANAGER]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Sync with latest main
        run: |
          git fetch origin main
          git checkout main
          git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Extract issue request
        if: github.event_name == 'issues'
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python - <<'PY'
          import os
          import re
          import json
          from pathlib import Path

          title = os.environ.get("ISSUE_TITLE", "")
          body = os.environ.get("ISSUE_BODY", "")

          def get_field(label):
              pattern = rf"### {re.escape(label)}\s*\n\s*(.*?)\s*(?=\n### |\Z)"
              match = re.search(pattern, body, re.S)
              if not match:
                  return ""
              value = match.group(1).strip()
              value = value.replace("_No response_", "").strip()
              return value

          def safe_int(value, default):
              try:
                  return int(str(value).strip())
              except Exception:
                  return default

          def clean_title_delete_name(issue_title):
              name = issue_title.strip()
              name = re.sub(r"^\[EPUB MANAGER\]\s*", "", name, flags=re.I)
              name = re.sub(r"^Delete\s+", "", name, flags=re.I)
              return name.strip()

          def clean_title_update_cover_name(issue_title):
              name = issue_title.strip()
              name = re.sub(r"^\[EPUB MANAGER\]\s*", "", name, flags=re.I)
              name = re.sub(r"^Update Cover\s+", "", name, flags=re.I)
              name = re.sub(r"^Cover\s+", "", name, flags=re.I)
              return name.strip()

          def find_first_image_url(text):
              match = re.search(
                  r"https?://[^\s<>)\"']+\.(?:jpg|jpeg|png|webp)(?:\?[^\s<>)\"']*)?",
                  text,
                  re.I
              )
              if match:
                  return match.group(0).strip()
              return ""

          mode = get_field("Request mode")
          engine = get_field("Engine") or "Auto"
          lower_title = title.lower()

          if lower_title.startswith("[epub manager] delete"):
              mode = "Delete Novel"
          elif lower_title.startswith("[epub manager] update cover") or lower_title.startswith("[epub manager] cover"):
              mode = "Update Cover Image"

          if not mode:
              if lower_title.startswith("[epub manager] delete"):
                  mode = "Delete Novel"
              elif lower_title.startswith("[epub manager] update cover") or lower_title.startswith("[epub manager] cover"):
                  mode = "Update Cover Image"
              elif lower_title.startswith("[epub manager] continue"):
                  mode = "New Novel"
              else:
                  mode = "New Novel"

          override_chapters = safe_int(get_field("Chapters to download"), 10)
          override_batches = safe_int(get_field("Batch size"), 1)

          items = []
          delete_data = {}
          update_cover_data = {}

          if mode == "New Novel":
              for i in range(1, 11):
                  url = get_field(f"Novel {i} Link")
                  novel_title = get_field(f"Novel {i} Name")
                  start_value = get_field(f"Novel {i} Starting Chapter")

                  if not url and not novel_title:
                      continue

                  if not url or not novel_title:
                      print(f"Skipping Novel {i}: missing link or name.")
                      continue

                  start_chapter = safe_int(start_value, 1)

                  items.append({
                      "start_url": url,
                      "novel_title": novel_title,
                      "start_chapter": start_chapter
                  })

              if not items:
                  raise SystemExit("No valid novel entries found for New Novel mode.")

          elif mode == "Update All Existing Novels":
              items = []

          elif mode == "Update Cover Image":
              update_cover_novel_name = get_field("Update Cover Novel Name")
              update_cover_image_url = get_field("Update Cover Image URL")

              if not update_cover_novel_name:
                  update_cover_novel_name = clean_title_update_cover_name(title)

              if not update_cover_image_url:
                  update_cover_image_url = find_first_image_url(body)

              if not update_cover_novel_name:
                  raise SystemExit("Update Cover Image mode requires a novel name.")

              if not update_cover_image_url:
                  raise SystemExit("Update Cover Image mode requires an image URL.")

              update_cover_data = {
                  "novel_name": update_cover_novel_name,
                  "image_url": update_cover_image_url
              }

          elif mode == "Delete Novel":
              delete_novel_name = get_field("Delete Novel Name")
              delete_files = get_field("Delete EPUB files") or "Yes"

              if not delete_novel_name:
                  delete_novel_name = clean_title_delete_name(title)

              if not delete_novel_name:
                  raise SystemExit("Delete Novel mode requires Delete Novel Name.")

              delete_data = {
                  "novel_name": delete_novel_name,
                  "delete_files": delete_files
              }

          else:
              raise SystemExit(f"Unknown Request mode: {mode}")

          request = {
              "mode": mode,
              "engine": engine,
              "overrides": {
                  "chapters_per_epub": override_chapters,
                  "max_batches": override_batches
              },
              "items": items,
              "delete": delete_data,
              "update_cover": update_cover_data
          }

          Path("data").mkdir(exist_ok=True)
          Path("data/epub_manager_request.json").write_text(
              json.dumps(request, indent=2, ensure_ascii=False),
              encoding="utf-8"
          )

          print(json.dumps(request, indent=2, ensure_ascii=False))
          PY

      - name: Create manual test request
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
        run: |
          mkdir -p data
          cat > data/epub_manager_request.json <<'JSON'
          {
            "mode": "Update All Existing Novels",
            "engine": "Auto",
            "overrides": {
              "chapters_per_epub": 10,
              "max_batches": 1
            },
            "items": [],
            "delete": {},
            "update_cover": {}
          }
          JSON


      - name: Queue request
        run: |
          python -c "from scripts.queue_manager import enqueue_from_request,pop_next_job_to_request; enqueue_from_request('scheduled' if "${{ github.event_name }}"=='schedule' else 'workflow'); pop_next_job_to_request()"

      - name: Run EPUB Manager
        id: run_manager
        continue-on-error: true
        run: |
          MODE=$(python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path("data/epub_manager_request.json").read_text(encoding="utf-8"))
          print(data.get("mode", ""))
          PY
          )

          if [ "$MODE" = "Combine EPUB Chunks" ]; then
            python scripts/combine_epubs.py
          elif [ "$MODE" = "Delete Novel" ]; then
            python scripts/delete_novel.py
          elif [ "$MODE" = "Update Cover Image" ]; then
            python scripts/update_cover.py
          elif [ "$MODE" = "Delete EPUB" ]; then
            python scripts/delete_epub.py
          else
            python scripts/engine_router.py
          fi

      - name: Generate RSS and direct EPUB links
        id: generate_rss
        continue-on-error: true
        run: |
          if [ -f scripts/generate_rss.py ]; then
            python scripts/generate_rss.py
          else
            echo "scripts/generate_rss.py not found. Skipping."
          fi

      - name: Validate library
        id: validate_library
        continue-on-error: true
        run: |
          if [ -f scripts/validate_library.py ]; then
            python scripts/validate_library.py
          else
            echo "scripts/validate_library.py not found. Skipping."
          fi

      - name: Commit EPUB and website updates
        id: commit_docs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          date -u +"%Y-%m-%dT%H:%M:%SZ" > docs/last-updated.txt

          git add docs/ data/settings.json || true

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit"
          else
            git commit -m "Process EPUB Manager request"
            git push origin main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on issue
        if: always() && github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f data/epub_manager_results.json ]; then
            echo "EPUB Manager request finished. Results:" > issue-comment.txt
            echo "" >> issue-comment.txt
            cat data/epub_manager_results.json >> issue-comment.txt
            echo "" >> issue-comment.txt

            if [ "${{ steps.run_manager.outcome }}" = "failure" ]; then
              echo "EPUB Manager reported a failure. Check the GitHub Actions log." >> issue-comment.txt
            else
              echo "EPUB Manager completed." >> issue-comment.txt
            fi

            if [ "${{ steps.generate_rss.outcome }}" = "failure" ]; then
              echo "" >> issue-comment.txt
              echo "RSS/direct links generation reported a problem." >> issue-comment.txt
            fi

            if [ "${{ steps.validate_library.outcome }}" = "failure" ]; then
              echo "" >> issue-comment.txt
              echo "Library validation reported a problem." >> issue-comment.txt
            fi

            echo "" >> issue-comment.txt
            echo "GitHub Pages should update automatically from main/docs." >> issue-comment.txt

            gh issue comment ${{ github.event.issue.number }} --body-file issue-comment.txt
          else
            gh issue comment ${{ github.event.issue.number }} --body "EPUB Manager failed before creating a result file. Check the GitHub Actions log."
          fi

      - name: Close issue
        if: always() && github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue close ${{ github.event.issue.number }} --comment "Request finished. Check the result comment and GitHub Actions log."

      - name: Fail workflow if EPUB Manager failed
        if: steps.run_manager.outcome == 'failure' || steps.generate_rss.outcome == 'failure' || steps.validate_library.outcome == 'failure'
        run: |
          echo "EPUB Manager, RSS generation, or validation failed."
          exit 1
