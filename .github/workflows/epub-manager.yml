name: EPUB Manager

on:
  issues:
    types:
      - opened
      - edited
      - reopened
      - labeled
  workflow_dispatch:
  schedule:
    - cron: "15 2 * * *"

permissions:
  contents: write
  issues: write

concurrency:
  group: epub-manager-main
  cancel-in-progress: false

jobs:
  build-epub:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || startsWith(github.event.issue.title, '[EPUB MANAGER]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Sync with latest main
        run: |
          git fetch origin main
          git checkout main
          git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Extract issue request
        if: github.event_name == 'issues'
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python - <<'PY'
          import os
          import re
          import json
          from pathlib import Path

          title = os.environ.get("ISSUE_TITLE", "")
          body = os.environ.get("ISSUE_BODY", "")

          def get_field(label):
              pattern = rf"### {re.escape(label)}\s*\n\s*(.*?)\s*(?=\n### |\Z)"
              match = re.search(pattern, body, re.S)
              if not match:
                  return ""
              value = match.group(1).strip()
              value = value.replace("_No response_", "").strip()
              return value

          def safe_int(value, default):
              try:
                  return int(str(value).strip())
              except Exception:
                  return default

          def clean_title_delete_name(issue_title):
              name = issue_title.strip()
              name = re.sub(r"^\[EPUB MANAGER\]\s*", "", name, flags=re.I)
              name = re.sub(r"^Delete\s+", "", name, flags=re.I)
              return name.strip()

          def clean_title_update_cover_name(issue_title):
              name = issue_title.strip()
              name = re.sub(r"^\[EPUB MANAGER\]\s*", "", name, flags=re.I)
              name = re.sub(r"^Update Cover\s+", "", name, flags=re.I)
              name = re.sub(r"^Cover\s+", "", name, flags=re.I)
              return name.strip()

          def find_first_image_url(text):
              match = re.search(
                  r"https?://[^\s<>)\"']+\.(?:jpg|jpeg|png|webp)(?:\?[^\s<>)\"']*)?",
                  text,
                  re.I
              )
              if match:
                  return match.group(0).strip()
              return ""

          mode = get_field("Request mode")
          engine = get_field("Engine") or "Auto"
          lower_title = title.lower()

          if lower_title.startswith("[epub manager] delete epub"):
              mode = "Delete EPUB"
          elif lower_title.startswith("[epub manager] delete"):
              mode = "Delete Novel"
          elif lower_title.startswith("[epub manager] update cover") or lower_title.startswith("[epub manager] cover"):
              mode = "Update Cover Image"
          elif lower_title.startswith("[epub manager] rebuild"):
              mode = "Rebuild EPUB"
          elif "combine epub chunks" in lower_title:
              mode = "Combine EPUB Chunks"
          elif "schedule update all" in lower_title:
              mode = "Schedule Update All"

          if not mode:
              if lower_title.startswith("[epub manager] delete epub"):
                  mode = "Delete EPUB"
              elif lower_title.startswith("[epub manager] delete"):
                  mode = "Delete Novel"
              elif lower_title.startswith("[epub manager] update cover") or lower_title.startswith("[epub manager] cover"):
                  mode = "Update Cover Image"
              elif lower_title.startswith("[epub manager] rebuild"):
                  mode = "Rebuild EPUB"
              elif lower_title.startswith("[epub manager] continue"):
                  mode = "New Novel"
              else:
                  mode = "New Novel"

          from scripts.queue_manager import map_mode
          mode = map_mode(mode)

          override_chapters = safe_int(get_field("Chapters to download"), 10)
          override_batches = safe_int(get_field("Batch size"), 1)

          items = []
          delete_data = {}
          update_cover_data = {}
          combine_data = {}
          schedule_data = {}
          delete_epub_data = {}
          rebuild_data = {}
          alternate_source_data = {}

          if mode == "New Novel":
              for i in range(1, 11):
                  url = get_field(f"Novel {i} Link")
                  novel_title = get_field(f"Novel {i} Name")
                  start_value = get_field(f"Novel {i} Starting Chapter")

                  if not url and not novel_title:
                      continue

                  if not url or not novel_title:
                      print(f"Skipping Novel {i}: missing link or name.")
                      continue

                  start_chapter = safe_int(start_value, 1)

                  items.append({
                      "start_url": url,
                      "novel_title": novel_title,
                      "start_chapter": start_chapter
                  })

              if not items:
                  raise SystemExit("No valid novel entries found for New Novel mode.")

          elif mode == "Update All Existing Novels":
              items = []

          elif mode == "Update Cover Image":
              update_cover_novel_name = get_field("Update Cover Novel Name")
              update_cover_image_url = get_field("Update Cover Image URL")

              if not update_cover_novel_name:
                  update_cover_novel_name = clean_title_update_cover_name(title)

              if not update_cover_image_url:
                  update_cover_image_url = find_first_image_url(body)

              if not update_cover_novel_name:
                  raise SystemExit("Update Cover Image mode requires a novel name.")

              if not update_cover_image_url:
                  raise SystemExit("Update Cover Image mode requires an image URL.")

              update_cover_data = {
                  "novel_name": update_cover_novel_name,
                  "image_url": update_cover_image_url
              }

          elif mode == "Combine EPUB Chunks":
              name = get_field("Novel name") or get_field("Combine Novel Name")
              slug = get_field("Novel slug")
              files = get_field("Selected EPUB files")
              start = safe_int(get_field("Start chapter") or get_field("Combine Start Chapter"), 1)
              end = safe_int(get_field("End chapter") or get_field("Combine End Chapter"), start)
              overwrite = (get_field("Overwrite combined file") or get_field("Overwrite Combined File") or "No")
              file_list = [line.strip() for line in files.splitlines() if line.strip()]
              combine_data = {"novel_name": name, "novel_slug": slug, "files": file_list, "start": start, "end": end, "overwrite": overwrite}

          elif mode == "Schedule Update All":
              schedule_data = {
                  "start_at": get_field("Start at (UTC)") or get_field("Start at") or "",
                  "repeat_days": safe_int(get_field("Repeat days"), 1)
              }

          elif mode == "Delete EPUB":
              delete_epub_data = {
                  "novel_name": get_field("Delete EPUB Novel Name"),
                  "start_chapter": safe_int(get_field("Delete EPUB Start Chapter"), 0),
                  "end_chapter": safe_int(get_field("Delete EPUB End Chapter"), 0),
                  "epub_url": get_field("Delete EPUB URL")
              }

              if not delete_epub_data["novel_name"]:
                  raise SystemExit("Delete EPUB mode requires Delete EPUB Novel Name.")

          elif mode == "Rebuild EPUB":
              rebuild_data = {
                  "novel_name": get_field("Rebuild Novel Name"),
                  "source_url": get_field("Rebuild Source URL"),
                  "start_chapter": safe_int(get_field("Rebuild Starting Chapter"), 1),
                  "end_chapter": safe_int(get_field("Rebuild Ending Chapter"), 0),
                  "existing_epub_url": get_field("Existing EPUB URL")
              }
              if rebuild_data["source_url"] and rebuild_data["novel_name"]:
                  items = [{
                      "start_url": rebuild_data["source_url"],
                      "novel_title": rebuild_data["novel_name"],
                      "start_chapter": rebuild_data["start_chapter"],
                      "end_chapter": rebuild_data["end_chapter"]
                  }]

          elif mode == "Delete Novel":
              delete_novel_name = get_field("Delete Novel Name")
              delete_files = get_field("Delete EPUB files") or "Yes"

              if not delete_novel_name:
                  delete_novel_name = clean_title_delete_name(title)

              if not delete_novel_name:
                  raise SystemExit("Delete Novel mode requires Delete Novel Name.")

              delete_data = {
                  "novel_name": delete_novel_name,
                  "delete_files": delete_files
              }

          else:
              raise SystemExit(f"Unknown Request mode: {mode}")

          request = {
              "mode": mode,
              "engine": engine,
              "overrides": {
                  "chapters_per_epub": override_chapters,
                  "max_batches": override_batches
              },
              "items": items,
              "delete": delete_data,
              "update_cover": update_cover_data,
              "combine": combine_data,
              "schedule": schedule_data,
              "delete_epub": delete_epub_data,
              "rebuild": rebuild_data,
              "alternate_source": alternate_source_data
          }

          Path("data").mkdir(exist_ok=True)
          Path("data/epub_manager_request.json").write_text(
              json.dumps(request, indent=2, ensure_ascii=False),
              encoding="utf-8"
          )

          print(json.dumps(request, indent=2, ensure_ascii=False))
          PY


      - name: Cron schedule guard and due sync
        if: github.event_name == 'schedule'
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from scripts.queue_manager import sync_due_schedules_to_queue
          settings = json.loads(Path('data/settings.json').read_text(encoding='utf-8')) if Path('data/settings.json').exists() else {}
          if not settings.get('scheduled_update_enabled', True):
              print('scheduled_update_enabled=false; exiting safely')
              raise SystemExit(0)
          due = sync_due_schedules_to_queue()
          print('due schedules synced:', due)
          PY

      - name: Create manual test request
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
        run: |
          mkdir -p data
          cat > data/epub_manager_request.json <<'JSON'
          {
            "mode": "Update All Existing Novels",
            "engine": "Auto",
            "overrides": {
              "chapters_per_epub": 10,
              "max_batches": 1
            },
            "items": [],
            "delete": {},
            "update_cover": {},
            "combine": {},
            "schedule": {},
            "delete_epub": {},
            "rebuild": {},
            "alternate_source": {}
          }
          JSON


      - name: Queue request
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          python - <<'PY'
          import os
          from scripts.queue_manager import enqueue_from_request, pop_next_job_to_request

          event_name = os.environ.get("EVENT_NAME", "")
          source = "scheduled" if event_name == "schedule" else "workflow"
          enqueue_from_request(source)
          pop_next_job_to_request()
          PY

      - name: Run EPUB Manager
        id: run_manager
        continue-on-error: true
        run: |
          MODE=$(python - <<'PY'
          import json
          from pathlib import Path
          from scripts.queue_manager import map_mode
          data = json.loads(Path("data/epub_manager_request.json").read_text(encoding="utf-8"))
          print(map_mode(data.get("mode", "")))
          PY
          )

          if [ "$MODE" = "Combine EPUB Chunks" ]; then
            python scripts/combine_epubs.py
          elif [ "$MODE" = "Delete Novel" ]; then
            python scripts/delete_novel.py
          elif [ "$MODE" = "update_cover" ] || [ "$MODE" = "Update Cover Image" ]; then
            python scripts/update_cover.py
          elif [ "$MODE" = "delete_epub" ] || [ "$MODE" = "Delete EPUB" ]; then
            python scripts/delete_epub.py
          elif [ "$MODE" = "Schedule Update All" ]; then
            python - <<'PY'
          import json
          from pathlib import Path
          from scripts.queue_manager import add_schedule
          req = json.loads(Path('data/epub_manager_request.json').read_text(encoding='utf-8'))
          schedule = req.get('schedule', {})
          start = schedule.get('start_at')
          repeat = int(schedule.get('repeat_days', 1) or 1)
          if start:
              add_schedule(start, repeat)
              print('Schedule added:', start, repeat)
          else:
              print('No start_at provided; skipping schedule create')
          PY
          else
            python scripts/engine_router.py
          fi

      - name: Generate RSS and direct EPUB links
        id: generate_rss
        continue-on-error: true
        run: |
          if [ -f scripts/generate_rss.py ]; then
            python scripts/generate_rss.py
          else
            echo "scripts/generate_rss.py not found. Skipping."
          fi

      - name: Generate OPDS catalogue
        id: generate_opds
        continue-on-error: true
        run: |
          if [ -f scripts/generate_opds.py ]; then
            python scripts/generate_opds.py
          else
            echo "scripts/generate_opds.py not found. Skipping."
          fi

      - name: Validate library
        id: validate_library
        continue-on-error: true
        run: |
          if [ -f scripts/validate_library.py ]; then
            python scripts/validate_library.py
          else
            echo "scripts/validate_library.py not found. Skipping."
          fi

      - name: Commit EPUB and website updates
        id: commit_docs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          date -u +"%Y-%m-%dT%H:%M:%SZ" > docs/last-updated.txt

          git add docs/ data/settings.json || true

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit"
          else
            git commit -m "Process EPUB Manager request"
            git push origin main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on issue
        if: always() && github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f data/epub_manager_results.json ]; then
            echo "EPUB Manager request finished. Results:" > issue-comment.txt
            echo "" >> issue-comment.txt
            cat data/epub_manager_results.json >> issue-comment.txt
            echo "" >> issue-comment.txt

            if [ "${{ steps.run_manager.outcome }}" = "failure" ]; then
              echo "EPUB Manager reported a failure. Check the GitHub Actions log." >> issue-comment.txt
            else
              echo "EPUB Manager completed." >> issue-comment.txt
            fi

            if [ "${{ steps.generate_rss.outcome }}" = "failure" ]; then
              echo "" >> issue-comment.txt
              echo "RSS/direct links generation reported a problem." >> issue-comment.txt
            fi

            if [ "${{ steps.generate_opds.outcome }}" = "failure" ]; then
              echo "" >> issue-comment.txt
              echo "OPDS catalogue generation reported a problem." >> issue-comment.txt
            fi

            if [ "${{ steps.validate_library.outcome }}" = "failure" ]; then
              echo "" >> issue-comment.txt
              echo "Library validation reported a problem." >> issue-comment.txt
            fi

            echo "" >> issue-comment.txt
            echo "GitHub Pages should update automatically from main/docs." >> issue-comment.txt

            gh issue comment ${{ github.event.issue.number }} --body-file issue-comment.txt
          else
            gh issue comment ${{ github.event.issue.number }} --body "EPUB Manager failed before creating a result file. Check the GitHub Actions log."
          fi

      - name: Close issue
        if: always() && github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue close ${{ github.event.issue.number }} --comment "Request finished. Check the result comment and GitHub Actions log."

      - name: Fail workflow if EPUB Manager failed
        if: steps.run_manager.outcome == 'failure' || steps.generate_rss.outcome == 'failure' || steps.generate_opds.outcome == 'failure' || steps.validate_library.outcome == 'failure'
        run: |
          echo "EPUB Manager, RSS generation, OPDS generation, or validation failed."
          exit 1
