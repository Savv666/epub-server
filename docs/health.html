<!doctype html><html><head><meta charset='utf-8'/><meta name='viewport' content='width=device-width,initial-scale=1'/><title>Health Check</title><link rel='stylesheet' href='style.css?v=health-1'/></head><body><main class='admin-page'><h1>Health Check</h1><div id='summary'></div><div id='warnings'></div><p><a class='rss-link' href='opds.xml'>OPDS</a> · <a class='rss-link' href='feed.xml'>RSS</a> · <a class='rss-link' href='epub-links.html'>Direct Links</a></p></main><script>
fetch('library.json').then(r=>r.json()).then(lib=>{const warnings=[];const titles={},slugs={},urls={},sites=new Set();let totalE=0,totalCh=0,missingCover=0,missingUrl=0,overlap=0,noDl=0,locked=0,partial=0,last='';lib.forEach(n=>{const t=(n.title||'').toLowerCase();titles[t]=(titles[t]||0)+1;const s=(n.slug||'').toLowerCase();if(s)slugs[s]=(slugs[s]||0)+1;sites.add(n.site||'Unknown');if(!n.cover)missingCover++;if(n.locked_chapter_number)locked++;if(/partial|locked|failed|problem/i.test(n.status||''))partial++;const ds=Array.isArray(n.downloads)?n.downloads:[];if(!ds.length)noDl++;let maxEnd=0;ds.sort((a,b)=>(a.start||0)-(b.start||0)).forEach((d,i)=>{totalE++;if(!d.url){missingUrl++;warnings.push(`${n.title}: Missing EPUB URL`)} else {urls[d.url]=(urls[d.url]||0)+1}maxEnd=Math.max(maxEnd,Number(d.end||0));if(i>0&&Number(d.start||0)<=Number(ds[i-1].end||0)){overlap++;warnings.push(`${n.title}: Overlapping chapter ranges`)}});totalCh+=maxEnd||Number(n.last_chapter_number||0);if((n.last_chapter_number||0)<maxEnd)warnings.push(`${n.title}: Last chapter lower than highest download end`);if(n.last_updated&&n.last_updated>last)last=n.last_updated;if(!n.cover)warnings.push(`${n.title}: Missing cover`);if(!ds.length)warnings.push(`${n.title}: Missing downloads`);});
const dupTitles=Object.values(titles).filter(v=>v>1).length,dupSlugs=Object.values(slugs).filter(v=>v>1).length,dupUrls=Object.values(urls).filter(v=>v>1).length;const severity=(dupUrls||missingUrl||overlap||noDl)?'red':(warnings.length?'amber':'green');document.getElementById('summary').innerHTML=`<div class='health-${severity}'><p>Total novels: ${lib.length}</p><p>Total EPUB files: ${totalE}</p><p>Total chapters tracked: ${totalCh}</p><p>Total sources/sites: ${sites.size}</p><p>Partial/problem novels: ${partial}</p><p>Missing cover count: ${missingCover}</p><p>Missing EPUB URL count: ${missingUrl}</p><p>Duplicate novel title count: ${dupTitles}</p><p>Duplicate slug count: ${dupSlugs}</p><p>Duplicate EPUB URL count: ${dupUrls}</p><p>Duplicate/overlapping chapter ranges count: ${overlap}</p><p>Novels without downloads: ${noDl}</p><p>Novels with locked_chapter_number: ${locked}</p><p>Most recent last_updated: ${last||'N/A'}</p></div>`;document.getElementById('warnings').innerHTML=warnings.length?`<h2>Warnings</h2><ul>${warnings.map(w=>`<li>${w}</li>`).join('')}</ul>`:'<p>No major warnings found.</p>'});
</script></body></html>
