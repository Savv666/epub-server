<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Admin Dashboard</title><link rel="stylesheet" href="style.css?v=admin-1"/></head><body><main class="admin-page"><h1>Admin Dashboard</h1><p class="subtitle">EPUB Server control panel</p><div class="admin-grid" id="adminGrid"></div><p><a class="rss-link" href="https://github.com/Sav666/epub-server/actions/workflows/backup-library.yml" target="_blank" rel="noopener noreferrer">Actions → Backup Library</a></p><p><a class="rss-link" href="index.html">← Back to library</a></p></main><script>
const repo='https://github.com/Sav666/epub-server';
const newNovelBody=`### Request mode\n\nNew Novel\n\n### Engine\n\nAuto\n\n### Chapters to download\n\n100\n\n### Batch size\n\n1\n\n### Novel 1 Link\n\nPASTE_NOVEL_CHAPTER_URL_HERE\n\n### Novel 1 Name\n\nNovel Title\n\n### Novel 1 Starting Chapter\n\n1`;
const updateAllBody=`### Request mode\n\nUpdate All Existing Novels\n\n### Engine\n\nAuto\n\n### Chapters to download\n\n100\n\n### Batch size\n\n1`;
const issue=(t,b)=>`${repo}/issues/new?${new URLSearchParams({title:t,body:b}).toString()}`;
const cards=[['Open Library','index.html'],['Add New Novel',issue('[EPUB MANAGER] New Novel',newNovelBody)],['Update All Novels',issue('[EPUB MANAGER] Update All Existing Novels',updateAllBody)],['Repair Centre','repair.html'],['Health Check','health.html'],['Direct EPUB Links','epub-links.html'],['RSS Feed','feed.xml'],['OPDS Catalogue','opds.xml'],['Latest OPDS Feed','opds/latest.xml']];
document.getElementById('adminGrid').innerHTML=cards.map(c=>`<a class="admin-card" href="${c[1]}" target="${c[1].startsWith('http')?'_blank':'_self'}" rel="noopener noreferrer">${c[0]}</a>`).join('');
</script></body></html>
