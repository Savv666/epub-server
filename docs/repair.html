<!doctype html><html><head><meta charset='utf-8'/><meta name='viewport' content='width=device-width,initial-scale=1'/><title>Repair Centre</title><link rel='stylesheet' href='style.css?v=repair-1'/></head><body><main class='admin-page'><h1>Repair Centre</h1><div class='toolbar'><input id='q' placeholder='Search title...'/><select id='site'><option value=''>All sites</option></select></div><div id='list'></div><p><a class='rss-link' href='admin.html'>Admin</a> · <a class='rss-link' href='index.html'>Library</a></p></main><script>
const repo='https://github.com/Sav666/epub-server';const issue=(t,b)=>`${repo}/issues/new?${new URLSearchParams({title:t,body:b}).toString()}`;
function problems(n){const p=[],s=(n.status||'').toLowerCase(),ps=(n.progress_state||'').toLowerCase();if(/partial|locked|failed|problem/.test(s))p.push('status');if(ps==='locked'||ps==='failed')p.push('progress_state');if(n.locked_chapter_number)p.push('locked_chapter');if(n.locked_reason)p.push('locked_reason');if(!Array.isArray(n.downloads)||!n.downloads.length)p.push('no_downloads');if(!n.next_url&&s!=='complete')p.push('missing_next_url');if((n.downloads||[]).some(d=>!d.url))p.push('missing_download_url');return p}
fetch('library.json').then(r=>r.json()).then(data=>{const bad=data.map(n=>({n,p:problems(n)})).filter(x=>x.p.length);const sites=[...new Set(bad.map(x=>x.n.site||'Unknown'))].sort();document.getElementById('site').innerHTML+='<option>'+sites.join('</option><option>')+'</option>';const render=()=>{const q=document.getElementById('q').value.toLowerCase(),site=document.getElementById('site').value;const rows=bad.filter(x=>(x.n.title||'').toLowerCase().includes(q)&&(!site||(x.n.site||'Unknown')===site));document.getElementById('list').innerHTML=rows.length?rows.map(({n,p})=>{const last=n.last_chapter_number||((n.downloads||[]).reduce((m,d)=>Math.max(m,Number(d.end||0)),0));const start=(last?last+1:(n.locked_chapter_number||1));const src=n.preferred_source_url||n.next_url||n.source_url||'PASTE_NEXT_CHAPTER_URL_HERE';const body=`### Request mode\n\nNew Novel\n\n### Engine\n\nAuto\n\n### Chapters to download\n\n100\n\n### Batch size\n\n1\n\n### Novel 1 Link\n\n${src}\n\n### Novel 1 Name\n\n${n.title||''}\n\n### Novel 1 Starting Chapter\n\n${start}`;return `<article class='novel-card'><h3>${n.title||'Untitled'}</h3><p>Status: ${n.status||'Unknown'} · Site: ${n.site||'Unknown'} · Preferred source: ${n.preferred_source_url||'Not set'}</p><p>Latest chapter: ${last||0} ${n.locked_chapter_number?`· Locked chapter: ${n.locked_chapter_number}`:''}</p><p>${n.locked_reason||''}</p><p>Problems: ${p.join(', ')}</p><div class='novel-actions'><a class='button button-primary' target='_blank' href='${issue(`[EPUB MANAGER] Continue ${n.title||'Untitled'}`,body)}'>Continue / Repair</a><a class='button button-secondary' target='_blank' href='${n.preferred_source_url||n.source_url||'#'}'>Open Source</a><a class='button button-secondary' href='opds/latest.xml'>Open OPDS Latest</a><a class='button button-secondary' href='epub-links.html'>Open Direct Links</a></div></article>`}).join(''):`<div class='empty-state'><h2>No repair items found.</h2></div>`};render();q.oninput=render;site.onchange=render;});
</script></body></html>
